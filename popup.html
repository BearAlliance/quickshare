<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 200px;
      margin: 0;
      padding: 8px 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
    }
    .popup-item {
      display: block;
      width: 100%;
      padding: 8px 16px;
      border: none;
      background: none;
      color: #172B4D;
      font-size: 14px;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      box-sizing: border-box;
    }
    .popup-item:hover {
      background: #F4F5F7;
    }
    .popup-message {
      padding: 12px 16px;
      color: #6B778C;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="content">
    <button class="popup-item" id="slack-btn">Copy as Slack</button>
    <button class="popup-item" id="markdown-btn">Copy as Markdown</button>
  </div>
  <div id="message" class="popup-message" style="display:none"></div>
  <script src="popup.js"></script>
</body>
</html>
