<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
    }
    .popup-header {
      padding: 10px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .popup-header-key {
      font-size: 11px;
      font-weight: 600;
      color: #0052CC;
      letter-spacing: 0.02em;
    }
    .popup-header-title {
      font-size: 13px;
      font-weight: 500;
      color: #172B4D;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .popup-divider {
      height: 1px;
      background: #EBECF0;
      margin: 4px 0;
    }
    .popup-item {
      display: block;
      width: 100%;
      padding: 8px 16px;
      border: none;
      background: none;
      color: #172B4D;
      font-size: 14px;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      box-sizing: border-box;
    }
    .popup-item:hover {
      background: #F4F5F7;
    }
    .popup-actions {
      padding-bottom: 4px;
    }
    .popup-message {
      padding: 12px 16px;
      color: #6B778C;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="content">
    <div class="popup-header">
      <span class="popup-header-key" id="issue-key"></span>
      <span class="popup-header-title" id="issue-title"></span>
    </div>
    <div class="popup-divider"></div>
    <div class="popup-actions">
      <button class="popup-item" id="slack-btn">Copy as Slack</button>
      <button class="popup-item" id="markdown-btn">Copy as Markdown</button>
    </div>
  </div>
  <div id="message" class="popup-message" style="display:none"></div>
  <script src="popup.js"></script>
</body>
</html>
