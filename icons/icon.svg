<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#4B44D1"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Clipboard back board -->
  <rect x="32" y="30" width="52" height="68" rx="6" fill="none" stroke="#fff" stroke-width="5" stroke-opacity="0.95"/>
  <!-- Clipboard clip -->
  <rect x="48" y="24" width="20" height="12" rx="4" fill="none" stroke="#fff" stroke-width="4.5" stroke-opacity="0.95"/>
  <!-- Front copy board (offset) -->
  <rect x="44" y="38" width="52" height="68" rx="6" fill="#4B44D1" stroke="#fff" stroke-width="5" stroke-opacity="0.95"/>
  <!-- Lines on front board -->
  <line x1="56" y1="56" x2="84" y2="56" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="56" y1="68" x2="80" y2="68" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="56" y1="80" x2="76" y2="80" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-opacity="0.9"/>
</svg>
